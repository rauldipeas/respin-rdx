search --set=root --file /respin-rdx
function load_video {
	insmod all_video
}
if loadfont /boot/grub/unicode.pf2;then
	set gfxmode=auto
	load_video
	insmod gfxterm
	insmod gettext
fi
terminal_output gfxterm
insmod gfxmenu
loadfont /boot/grub/themes/breeze/unifont-bold-16.pf2
loadfont /boot/grub/themes/breeze/unifont-regular-14.pf2
loadfont /boot/grub/themes/breeze/unifont-regular-16.pf2
loadfont /boot/grub/themes/breeze/unifont-regular-32.pf2
insmod png
set theme=/boot/grub/themes/breeze/theme.txt
export theme
set menu_color_normal=white/black
set menu_color_highlight=black/light-gray
set default=0
set timeout=10
menuentry "PLACEHOLDER Respin RDX" {
   linux /casper/vmlinuz boot=casper cpufreq.default_governor=performance locale=pt_BR logo.nologo loglevel=0 maybe-ubiquity mitigations=off preempt=full quiet splash threadirqs vt.global_cursor_default=0 ---
   initrd /casper/initrd
}