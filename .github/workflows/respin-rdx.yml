name: Respin RDX
on:
  push:
    branches:
      - 'main'
  schedule:
    - cron:  '0 */24 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - name: Configuração do ambiente de compilação
        run: bash scripts/env.sh
      - name: Compilação do Ubuntu Respin RDX
        run: $FLAVOUR=ubuntu $FLAVOUR_NAME=Ubuntu bash -x build.sh
      - name: Compilação do Kubuntu Respin RDX
        run: $FLAVOUR=kubuntu $FLAVOUR_NAME=Kubuntu bash -x build.sh
      - name: Compilação do Xubuntu Respin RDX
        run: $FLAVOUR=xubuntu $FLAVOUR_NAME=Xubuntu bash -x build.sh
      - name: Upload dos artefatos
        uses: actions/upload-artifact@v3
        with:
          name: respin-rdx
          path: /home/runner/work/respin-rdx/*-respin-rdx.iso
      - name: Limpeza de logs antigos
        run: bash scripts/actions-cleanup.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}