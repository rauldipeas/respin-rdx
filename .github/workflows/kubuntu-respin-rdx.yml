name: Kubuntu Respin RDX
on:
  push:
    branches:
      - 'main'
    paths-ignore:
      - '.editorconfig'
      - 'leiame.md'
      - 'readme.md'
      - '*.jpg'
      - '*.png'
      - '*.svg'
      - '_config.yml'
      - 'get-respin-rdx.sh'
      - 'upgrade-respin-rdx.sh'
  schedule:
    - cron:  '0 */24 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - name: Configuração do ambiente de compilação
        run: bash -x scripts/env.sh
      - name: Compilação do Kubuntu Respin RDX
        run: bash -x scripts/build.sh
        env:
          CODENAME: jammy
          FLAVOUR: kubuntu
          FLAVOUR_NAME: Kubuntu
          VERSION: 22.04.2
          CHROOT: respin-rdx/kubuntu-chroot
          FLAVOUR_ID: Kubuntu
          ISO_NAME: kubuntu
      - name: Envio dos artefatos
        uses: actions/upload-artifact@v3
        with:
          name: kubuntu-respin-rdx
          path: /home/runner/work/respin-rdx/kubuntu-respin-rdx.iso
      - name: Envio de artefatos para o SFTP
        uses: Dylan700/sftp-upload-action@latest
        with:
          server: ${{ secrets.SFTP_SERVER }}
          username: ${{ secrets.SFTP_USER }}
          key: ${{ secrets.SFTP_KEY}}
          port: 22
          uploads: |
            /home/runner/work/respin-rdx/kdeck-respin-rdx.iso => /home/${{ secrets.SFTP_USER }}/respin-rdx/
      - name: Limpeza de logs antigos
        run: bash -x scripts/actions-cleanup.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}