name: Neon RDX
on:
  push:
    branches:
      - 'main'
  schedule:
    - cron:  '0 */24 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - name: Configuração do ambiente de compilação
        run: bash scripts/env.sh
      - name: Compilação do Neon RDX
        run: |
          cd scripts/neon
          bash -x build.sh -
      - name: Upload dos artefatos
        uses: actions/upload-artifact@v3
        with:
          name: neon-rdx
          path: /home/runner/work/kubuntu-rdx/kubuntu-rdx/scripts/neon/neon-rdx.iso
      - name: Limpeza de logs antigos
        run: bash scripts/actions-cleanup.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}